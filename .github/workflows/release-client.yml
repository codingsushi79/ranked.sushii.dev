name: Release Windows client

on:
  workflow_dispatch:
  push:
    tags:
      - "client-v*"

permissions:
  contents: write

env:
  CSC_IDENTITY_AUTO_DISCOVERY: false

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Build client bundle
        working-directory: client
        env:
          RANKED_UPDATE_URL: https://github.com/codingsushi79/ranked.sushii.dev/releases/download/client-latest
        run: npm run build

      - name: Package Windows installer
        working-directory: client
        env:
          ELECTRON_BUILDER_OUTPUT: release/build
        run: npx electron-builder --config electron-builder.config.cjs --win nsis --x64 --publish never

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            client/release/build/ranked-cs2-client-setup.exe
            client/release/build/latest.yml
          generate_release_notes: true
