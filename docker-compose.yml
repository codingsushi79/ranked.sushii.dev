services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ranked
      POSTGRES_PASSWORD: ranked
      POSTGRES_DB: ranked_cs2
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./drizzle/0000_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ranked -d ranked_cs2"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://ranked:ranked@db:5432/ranked_cs2
      AUTH_SECRET: ${AUTH_SECRET:-dev-docker-secret-change-me-in-production}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-Ranked CS2 <onboarding@resend.dev>}
      STEAM_API_KEY: ${STEAM_API_KEY:-}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
